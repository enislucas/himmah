<!DOCTYPE html>
<!-- Himmah. Copyright (c) 2026 Enis Lucas Ziadin. All rights reserved. -->
<html lang="en">
<head>
<meta charset="utf-8" />
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#04060a" />
<title>Himmah</title>
<link rel="icon" href="icon.svg" type="image/svg+xml" />
<link rel="apple-touch-icon" href="icon-192.png" />
<link rel="manifest" href="manifest.webmanifest" />
<link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="bg" aria-hidden="true"></div>
  <div id="cursorDot" aria-hidden="true"></div>

  <header class="topbar">
    <div class="brand"><span class="brand-mark">▲</span> Himmah</div>
    <div class="topbar-actions">
      <button class="ghost-btn ai-chip" id="aiBtn" data-act="ai-menu" title="AI"><span class="ico">✦</span> AI</button>
      <button class="ghost-btn" data-act="open-calendar" title="Calendar - your schedules"><span class="ico">📅</span> Calendar</button>
      <button class="ghost-btn" data-act="open-inbox" title="Inbox - untriaged captures"><span class="ico">📥</span> Inbox <span id="inboxCount" class="pill"></span></button>
      <button class="ghost-btn" data-act="open-ideas" title="Idea Parking Lot - random thoughts &amp; ideas, kept completely separate from your tasks"><span class="ico">💡</span> Ideas <span id="ideaCount" class="pill"></span></button>
      <div class="more-wrap">
        <button class="ghost-btn" id="moreBtn" data-act="more-menu" title="More - travel, guardian, habits, rhythms, waiting, tidy, archive, history" aria-haspopup="true" aria-expanded="false"><span class="ico">⋯</span> More <span id="moreCount" class="pill"></span></button>
        <div id="moreMenu" class="more-menu" hidden role="menu" aria-label="More">
          <button class="ghost-btn" id="travelBtn" data-act="travel-toggle" title="Travelling mode - combine &amp; shorten prayers, ease habits"><span class="ico">✈</span> Travel</button>
          <button class="ghost-btn" id="guardianBtn" data-act="open-guardian" title="Priorities Guardian - protect your high-value goods from being silently dropped when a deal lands"><span class="ico">⛨</span> Guardian</button>
          <span id="guardDealPill" class="guard-deal-pill" hidden></span>
          <button class="ghost-btn" data-act="open-habits" title="Habits - daily rhythms with a load budget"><span class="ico">🌱</span> Habits</button>
          <button class="ghost-btn" data-act="open-rhythms" title="Rhythms - light parallel routines, miss-tracked"><span class="ico">🔄</span> Rhythms</button>
          <button class="ghost-btn" data-act="open-waiting" title="Waiting - tasks blocked on a dependency or an external reply"><span class="ico">⏳</span> Waiting <span id="waitingCount" class="pill"></span></button>
          <button class="ghost-btn" data-act="open-tidy" title="Tidy - short-term tasks gone quiet, prune when you like"><span class="ico">🧹</span> Tidy <span id="tidyCount" class="pill"></span></button>
          <button class="ghost-btn" data-act="open-archive" title="Completed tasks"><span class="ico">✓</span> Archive</button>
          <button class="ghost-btn" data-act="open-history" title="Version history"><span class="ico">⟲</span> History</button>
        </div>
      </div>
    </div>
  </header>

  <div class="capture">
    <span class="capture-bolt">⚡</span>
    <input id="captureInput" autocomplete="off" spellcheck="false" placeholder="dump a thought…  ·  Enter to capture" />
    <button id="brainDumpBtn" class="bd-btn" data-act="brain-dump" title="Brain dump - empty your head in 60 seconds" aria-label="brain dump">🧠</button>
    <button id="importBtn" class="impfile-btn" data-act="import-file" title="Import a file (PDF, txt, md, Word, csv) into your Inbox" aria-label="import file">📎</button>
    <button id="micBtn" class="mic-btn" data-act="mic" title="dictate (voice capture)" aria-label="voice capture" hidden>🎙</button>
    <button id="captureBtn" class="glow-btn" data-act="capture">Capture</button>
  </div>
  <div class="capture-hint">file as you type: <code>/crit</code> <code>/urg1</code>·<code>2</code>·<code>3</code> <code>/&lt;category&gt;</code> <code>/eta 30m</code> · <code>/eta fri</code> · <code>/cal</code> 📅 suggest a time block · plain “by friday” works too</div>

  <main id="app">
    <section id="stats" class="stats"></section>
    <section id="focus" class="focus"></section>
  </main>

  <section id="canvasview" class="canvasview"></section>
  <section id="calendarview" class="calendarview" hidden></section>

  <div id="smokeLayer" class="smoke-layer" aria-hidden="true"></div>

  <div id="scrim" class="scrim" hidden></div>
  <aside id="drawer" class="drawer" hidden aria-label="Edit task"></aside>
  <aside id="inboxPanel" class="side-panel" hidden aria-label="Inbox"></aside>
  <section id="inboxFull" class="inbox-full" hidden aria-label="Inbox - full screen"></section>
  <section id="ideasFull" class="inbox-full ideas-full" hidden aria-label="Idea Parking Lot"></section>
  <aside id="waitingPanel" class="side-panel" hidden aria-label="Waiting"></aside>
  <aside id="guardianPanel" class="side-panel" hidden aria-label="Priorities Guardian"></aside>
  <aside id="historyPanel" class="side-panel" hidden aria-label="Version history"></aside>
  <aside id="archivePanel" class="side-panel" hidden aria-label="Completed archive"></aside>
  <aside id="habitsPanel" class="side-panel" hidden aria-label="Habits">
    <div class="drawer-head"><span class="drawer-kicker" style="color:#7cd99e">habits</span><span class="dh-btns"><button class="ghost-btn" data-act="habits-help" title="What are habits, and how do I use this panel?">?</button><button class="ghost-btn" data-act="close-habits">✕</button></span></div>
    <section id="rhythms" class="rhythms-sec panel-sec"></section>
  </aside>
  <aside id="rhythmsPanel" class="side-panel" hidden aria-label="Rhythms">
    <div class="drawer-head"><span class="drawer-kicker" style="color:#7cd0f5">rhythms</span><span class="dh-btns"><button class="ghost-btn" data-act="rhythms-help" title="What are rhythms, and how are they different from habits?">?</button><button class="ghost-btn" data-act="close-rhythms">✕</button></span></div>
    <section id="rituals" class="rhythms-sec rituals-sec panel-sec"></section>
  </aside>
  <aside id="tidyPanel" class="side-panel" hidden aria-label="Tidy">
    <div class="drawer-head"><span class="drawer-kicker" style="color:#f5c46f">tidy</span><span class="dh-btns"><button class="ghost-btn" data-act="tidy-help" title="What is Tidy?">?</button><button class="ghost-btn" data-act="close-tidy">✕</button></span></div>
    <p class="hist-note">Short-term tasks that have been quiet ~10+ days. No rush - keep, snooze, or archive when you like.</p>
    <section id="pruneNudge" class="prune-nudge panel-sec"></section>
  </aside>
  <div id="searchOverlay" class="search-overlay" hidden aria-hidden="true">
    <div class="search-bubble" role="combobox" aria-expanded="false" aria-owns="searchResults">
      <div class="search-aura" aria-hidden="true"></div>
      <div class="search-input-wrap">
        <span class="search-ico">⌕</span>
        <input id="searchInput" class="search-input" type="text" autocomplete="off" spellcheck="false" placeholder="search tasks by title, notes, category…" aria-controls="searchResults" />
        <kbd class="search-kbd">esc</kbd>
      </div>
      <ul id="searchResults" class="search-results" role="listbox"></ul>
    </div>
  </div>
  <div id="naseerAura" class="naseer-aura" hidden aria-hidden="true"></div>
  <aside id="naseerPanel" class="naseer-panel" hidden aria-label="Naseer - your assistant"></aside>
  <button id="naseerLauncher" class="naseer-launcher" data-act="naseer-toggle" title="Ask Naseer (Ctrl+I)" aria-label="Open Naseer"><span class="naseer-mark" aria-hidden="true"></span></button>
  <div id="voiceDock" class="voice-dock" hidden aria-label="Voice"></div>
  <div id="popup" class="popup" hidden></div>

  <div id="toast" class="toast" hidden></div>
  <div id="undoToast" class="undo-toast" hidden>
    <span id="undoToastMsg"></span>
    <button class="undo-btn" data-act="undo-restore">Undo</button>
  </div>

  <script src="app.js"></script>
</body>
</html>
